<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Friendship 💚</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#56ab2f,#a8e063);
    color: white;
    text-align: center;
}

.box {
    max-width: 400px;
    margin: 50px auto;
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 15px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border-radius: 20px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>🔐 Enter Secret Password</h2>
    <input type="password" id="password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="box hidden" id="formBox">
    <h3 id="question"></h3>
    <input id="answer">
    <button onclick="next()">Next ➡️</button>
</div>

<div class="box hidden" id="doneBox">
    <h2>🎉 Completed!</h2>
</div>

<script>
const SECRET = "gowtham123"; // change password

const questions = [
"Full Name","Nickname","Where are you from?","DOB",
"Favorite Color","Favorite Food","Favorite Movie","Favorite Actor",
"Music","Hobby","Free time","Morning/Night",
"Introvert/Extrovert","Dream Job","Best Friend",
"Happy Moment","Fear","Dream Place","Memory","Life Goal"
];

let step = 0;
let answers = {};

function checkPassword(){
    let pass = document.getElementById("password").value;
    if(pass === SECRET){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("formBox").classList.remove("hidden");
        loadQuestion();
    } else {
        alert("Wrong Password 😜");
    }
}

function loadQuestion(){
    document.getElementById("question").innerText = questions[step];
    document.getElementById("answer").value = "";
}

function next(){
    let ans = document.getElementById("answer").value;
    answers["q"+(step+1)] = ans;

    step++;

    if(step < questions.length){
        loadQuestion();
    } else {
        submitData();
    }
}

function submitData(){
    fetch("save_data.php", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(answers)
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("formBox").classList.add("hidden");
        document.getElementById("doneBox").classList.remove("hidden");
    });
}
</script>

</body>
</html>
