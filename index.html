<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💚 Secret Friendship 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(-45deg,#56ab2f,#a8e063,#00c9ff,#92fe9d);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

@keyframes gradientMove {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

.card {
  width: 95%;
  max-width: 420px;
  background: rgba(0,0,0,0.5);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  animation: fadeIn 1s ease;
}

h2 { margin-bottom: 15px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 30px;
  border: none;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.progress {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #00ffcc;
  border-radius: 10px;
  transition: 0.4s;
}

.hidden { display: none; }

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.shake {
  animation: shake 0.3s;
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
}

.heart {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: floatUp 5s linear;
}

@keyframes floatUp {
  to { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<div class="card" id="login">
  <h2>🔐 Enter Secret</h2>
  <input type="password" id="pass">
  <button onclick="unlock()">Unlock 💚</button>
</div>

<div class="card hidden" id="quiz">
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <h2 id="question"></h2>
  <input id="answer">
  <button onclick="next()">Next ➡️</button>
</div>

<div class="card hidden" id="done">
  <h2>🎉 Friendship Saved 💖</h2>
  <p>Thank you for sharing!</p>
</div>

<script>
const SECRET = "gowtham123";

const questions = [
"Your Full Name 💫",
"Nickname 😎",
"Where are you from 🌍",
"Date of Birth 🎂",
"Favorite Color 🎨",
"Favorite Food 🍕",
"Favorite Movie 🎬",
"Favorite Actor ⭐",
"Music Taste 🎵",
"Hobby 🎯",
"Free Time Activity ⏳",
"Morning or Night 🌙",
"Introvert or Extrovert 🤔",
"Dream Job 💼",
"Best Friend 👯",
"What makes you happy 😊",
"Biggest Fear 😨",
"Dream Travel Place ✈️",
"Favorite Memory 📸",
"Life Goal 🚀"
];

let step = 0;
let answers = {};

function unlock(){
  let val = document.getElementById("pass").value;
  if(val === SECRET){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    load();
  } else {
    document.getElementById("login").classList.add("shake");
    setTimeout(()=>login.classList.remove("shake"),300);
  }
}

function load(){
  document.getElementById("question").innerText = questions[step];
  document.getElementById("answer").value = "";
  document.getElementById("bar").style.width = ((step)/20*100)+"%";
}

function next(){
  let val = document.getElementById("answer").value;
  if(val === "") return;

  answers["q"+(step+1)] = val;
  step++;

  createHearts();

  if(step < questions.length){
    load();
  } else {
    submit();
  }
}

function submit(){
  fetch("save_data.php", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(answers)
  });

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("done").classList.remove("hidden");
}

function createHearts(){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💚";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
}
</script>

</body>
</html>
